<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aviary — Field Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,400;1,500&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <defs>
        <!-- Pixel-art birds. 16×16 grid, currentColor, crisp edges (see theme.css). -->

        <!-- Owl — Claude. Round body + two ear tufts + carved eyes. -->
        <symbol id="bird-owl" viewBox="0 0 16 16" shape-rendering="crispEdges">
          <path fill="currentColor" d="M5 2h1v2H5z M10 2h1v2h-1z M6 4h4v1H6z M4 5h8v1H4z M3 6h10v3H3z M4 9h8v2H4z M5 11h6v1H5z M6 12h4v1H6z"/>
          <path fill="#0f1012" d="M5 6h2v2H5z M9 6h2v2H9z"/>
          <path fill="currentColor" d="M6 7h1v1H6z M9 7h1v1H9z M7 8h2v1H7z"/>
        </symbol>

        <!-- Raven — Codex. Sleek leftward profile, long beak + tail. -->
        <symbol id="bird-raven" viewBox="0 0 16 16" shape-rendering="crispEdges">
          <path fill="currentColor" d="M1 7h3v1H1z M3 5h3v4H3z M6 4h6v3H6z M11 4h3v1h-3z M6 7h6v2H6z M7 9h4v1H7z M7 10h1v2H7z M10 10h1v2h-1z"/>
          <path fill="#0f1012" d="M4 6h1v1H4z"/>
        </symbol>

        <!-- Falcon — Antigravity. Swept-back wings, pointed body (stoop). -->
        <symbol id="bird-falcon" viewBox="0 0 16 16" shape-rendering="crispEdges">
          <path fill="currentColor" d="M7 2h2v3H7z M3 4h1v1H3z M4 5h1v1H4z M5 6h1v1H5z M12 4h1v1h-1z M11 5h1v1h-1z M10 6h1v1h-1z M6 5h4v3H6z M7 8h2v4H7z M6 12h1v1H6z M9 12h1v1H9z"/>
        </symbol>

        <!-- Flock in flight — empty state. Three pixel gulls. -->
        <symbol id="bird-flight" viewBox="0 0 40 16" shape-rendering="crispEdges">
          <path fill="currentColor" d="M3 6h1v1H3z M4 5h1v1H4z M5 4h1v1H5z M6 5h1v1H6z M7 6h1v1H7z
            M16 9h1v1h-1z M17 8h1v1h-1z M18 7h1v1h-1z M19 8h1v1h-1z M20 9h1v1h-1z
            M30 5h1v1h-1z M31 4h1v1h-1z M32 3h1v1h-1z M33 4h1v1h-1z M34 5h1v1h-1z"/>
        </symbol>

        <!-- Pixel corner bracket — replaces the old fleuron ornament. -->
        <symbol id="fleuron" viewBox="0 0 8 8" shape-rendering="crispEdges">
          <path fill="currentColor" d="M0 0h5v1H0z M0 1h1v4H0z"/>
        </symbol>
      </defs>
    </svg>

    <div id="root"></div>

    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
