[package]
name = "aviary"
version = "0.1.0"
edition = "2021"

[lib]
name = "aviary_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# Dev-only HTTP/WS bridge (browser testing). Excluded from normal builds; only
# compiled with `--features devserver`. See src/devserver.rs.
[[bin]]
name = "aviary-devserver"
path = "src/bin/devserver.rs"
required-features = ["devserver"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"] }
futures-util = "0.3"
bollard = "0.17"
bytes = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4"] }
once_cell = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Dev bridge only — optional, pulled in by the `devserver` feature.
axum = { version = "0.7", features = ["ws"], optional = true }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
# Compiles the standalone HTTP/WS bridge bin for browser-based UI testing.
devserver = ["dep:axum"]
