# CodeHub runtime tmux theme.
#
# tmux's default status bar is bright green, which clashes with CodeHub's muted
# palette. This restyles it to match the app chrome (dark bg, faint mono text,
# neutral wordmark) so the in-pane status line reads as part of CodeHub instead
# of stock tmux. Palette mirrors the design tokens (tokens.css):
#   bg-0 #08090b · bg-2 #171b22 · bg-active #2b323d · bd #262b34
#   fg-0 #ecedf0 · fg-1 #aeb2bb · fg-2 #6a6f79 · fg-3 #3f444d
#
# Loaded from /root/.tmux.conf on tmux server start (HOME=/root in the image).

# Truecolor: CodeHub's terminal (xterm.js) renders 24-bit RGB, so advertise it
# and the hex colours below render exactly instead of snapping to the 256 cube.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# --- Status bar -------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-justify left
# bg = bg-2 (#171b22), matching the pane-head strip above the terminal, so the
# status line reads as a distinct bar against the darker pane body (#08090b).
set -g status-style "bg=#171b22,fg=#6a6f79"

# Keep the window name CodeHub set at create time (`tmux new-session -n "Owl 1"`)
# — don't let the launched CLI relabel it via title escapes or auto-rename.
set -g allow-rename off
setw -g automatic-rename off

# Left: the CodeHub alias (window name) in neutral white, then a faint rule.
set -g status-left-length 40
set -g status-left " #[fg=#ecedf0,bold]#W #[fg=#262b34]│"

# Right: clock + date, dim.
set -g status-right-length 40
set -g status-right "#[fg=#6a6f79]%H:%M #[fg=#3f444d]· %d-%b "

# Single window per CodeHub session, and the alias already shows on the left, so
# the per-window list is redundant — hide it.
setw -g window-status-format ""
setw -g window-status-current-format ""
setw -g window-status-separator ""

# --- Borders / messages (tmux's own splits, rarely used inside CodeHub) ------
set -g pane-border-style "fg=#262b34"
set -g pane-active-border-style "fg=#6a6f79"
set -g message-style "bg=#171b22,fg=#aeb2bb"
set -g mode-style "bg=#2b323d,fg=#ecedf0"
