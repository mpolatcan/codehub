# Aviary runtime tmux theme.
#
# tmux's default status bar is bright green, which clashes with Aviary's muted
# field-journal palette. This restyles it to match the app chrome (dark bg,
# faint mono text, ochre accent) so the in-pane status line reads as part of
# Aviary instead of stock tmux. Palette mirrors theme.css:
#   bg-deep #0b0c0d · panel #16181c · rule #2a2e35 · accent #e8a33d
#   accent-deep #8f6526 · text #c9cdd4 · text-faint #5c636d · text-ghost #3e444c
#
# Loaded from /root/.tmux.conf on tmux server start (HOME=/root in the image).

# Truecolor: Aviary's terminal (xterm.js) renders 24-bit RGB, so advertise it
# and the hex colours below render exactly instead of snapping to the 256 cube.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# --- Status bar -------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-justify left
# bg = panel (#16181c), matching the pane-head strip above the terminal, so the
# status line reads as a distinct bar against the darker pane body (#0b0c0d).
set -g status-style "bg=#16181c,fg=#8b929c"

# Left: session name in accent ochre, then a faint rule.
set -g status-left-length 40
set -g status-left " #[fg=#e8a33d,bold]#S #[fg=#2a2e35]│"

# Right: clock + date, dim.
set -g status-right-length 40
set -g status-right "#[fg=#8b929c]%H:%M #[fg=#5c636d]· %d-%b "

# Window list: current window an ochre chip, the rest faint.
setw -g window-status-format " #[fg=#5c636d]#I:#W "
setw -g window-status-current-format " #[fg=#0b0c0d,bg=#e8a33d,bold] #I:#W #[default]"
setw -g window-status-separator ""

# --- Borders / messages (tmux's own splits, rarely used inside Aviary) ------
set -g pane-border-style "fg=#2a2e35"
set -g pane-active-border-style "fg=#8f6526"
set -g message-style "bg=#16181c,fg=#c9cdd4"
set -g mode-style "bg=#8f6526,fg=#0b0c0d"
