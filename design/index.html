<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CodeHub — design</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Geist', sans-serif; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="store.jsx"></script>
  <script type="text/babel" src="screens/welcome.jsx"></script>
  <script type="text/babel" src="screens/new-workspace.jsx"></script>
  <script type="text/babel" src="screens/main-hub-a.jsx"></script>
  <script type="text/babel" src="screens/hub-states.jsx"></script>
  <script type="text/babel" src="screens/spawn-dialog.jsx"></script>
  <script type="text/babel" src="screens/dashboard.jsx"></script>
  <script type="text/babel" src="screens/session-detail.jsx"></script>
  <script type="text/babel" src="screens/container-inspector.jsx"></script>
  <script type="text/babel" src="screens/settings.jsx"></script>
  <script type="text/babel" src="screens/command-palette.jsx"></script>
  <script type="text/babel" src="screens/empty-state.jsx"></script>
  <script type="text/babel" src="screens/agent-settings.jsx"></script>
  <script type="text/babel" src="screens/workspace.jsx"></script>
  <script type="text/babel" src="screens/live-activities.jsx"></script>
  <script type="text/babel" src="screens/companion.jsx"></script>
  <script type="text/babel" src="screens/usage.jsx"></script>
  <script type="text/babel" src="screens/shortcuts.jsx"></script>
  <script type="text/babel" src="screens/resume.jsx"></script>
  <script type="text/babel" src="screens/integrations.jsx"></script>
  <script type="text/babel" src="screens/states.jsx"></script>
  <script type="text/babel" src="screens/about.jsx"></script>
  <script type="text/babel" src="screens/platform.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "mono": "JetBrains Mono",
      "sans": "Mono everywhere",
      "liveAccent": "green",
      "containerModel": "per-repo",
      "theme": "dark",
      "density": "comfortable",
      "activityRail": "visible",
      "sidebar": "expanded",
      "fontScale": 16
    }/*EDITMODE-END*/;

    const MONO_STACKS = {
      'Geist Mono': "'Geist Mono', ui-monospace, monospace",
      'JetBrains Mono': "'JetBrains Mono', ui-monospace, monospace",
      'IBM Plex Mono': "'IBM Plex Mono', ui-monospace, monospace",
    };
    const SANS_STACKS = {
      'Geist': "'Geist', ui-sans-serif, sans-serif",
      'IBM Plex Sans': "'IBM Plex Sans', ui-sans-serif, sans-serif",
      'Mono everywhere': null, // sentinel — sans becomes mono
    };
    const LIVE_HUES = {
      'green': 145,
      'amber': 80,
      'cyan': 200,
      'violet': 295,
    };

    function applyTweaks(t) {
      const r = document.documentElement.style;
      const mono = MONO_STACKS[t.mono] || MONO_STACKS['Geist Mono'];
      const sans = t.sans === 'Mono everywhere' ? mono : (SANS_STACKS[t.sans] || SANS_STACKS['Geist']);
      r.setProperty('--mono', mono);
      r.setProperty('--sans', sans);
      const hue = LIVE_HUES[t.liveAccent] || 145;
      // light theme needs a darker live for readable contrast
      const L = t.theme === 'light' ? 0.58 : 0.80;
      const C = t.theme === 'light' ? 0.16 : 0.17;
      r.setProperty('--live', `oklch(${L} ${C} ${hue})`);
      r.setProperty('--live-dim', `oklch(${L} ${C} ${hue} / ${t.theme === 'light' ? 0.14 : 0.18})`);
      document.documentElement.classList.toggle('ch-theme-light', t.theme === 'light');
      document.documentElement.classList.toggle('ch-theme-gray', t.theme === 'gray');
      document.documentElement.classList.toggle('ch-dens-compact', t.density === 'compact');
      document.documentElement.classList.toggle('ch-rail-hidden', t.activityRail === 'hidden');
      document.documentElement.classList.toggle('ch-sidebar-collapsed', t.sidebar === 'collapsed');
      // Root font size drives every rem-based size in styles.css + inline styles.
      // Drag the slider to see the whole UI scale.
      r.setProperty('--root-font-size', `${t.fontScale}px`);
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      React.useEffect(() => { applyTweaks(t); }, [t]);

      return (
        <>
          <window.DesignCanvas>
            {/* HUB — the home surface. Includes entry points (welcome/new),
                the main hub itself, focused views (workspace), overlays/
                drawers (palette, shortcuts, resume), inspectors (diff),
                and all hub state snapshots. */}
            <window.DCSection id="hub" title="Hub" subtitle="Entry → main hub → focused views → overlays → inspectors → states">
              {/* Entry */}
              <window.DCArtboard id="welcome" label="Welcome · workspace launcher" width={1440} height={900}>
                <Welcome />
              </window.DCArtboard>
              <window.DCArtboard id="new-workspace" label="New workspace · 3-step wizard" width={1440} height={900}>
                <NewWorkspace />
              </window.DCArtboard>

              {/* Core surfaces */}
              <window.DCArtboard id="main-hub" label="Main Hub · workspace + groups + flexible split grid" width={1440} height={900}>
                <MainHubA />
              </window.DCArtboard>
              <window.DCArtboard id="workspace" label="Workspace · files + agent + shell" width={1440} height={900}>
                <Workspace />
              </window.DCArtboard>

              {/* Overlays + drawers triggered from the hub */}
              <window.DCArtboard id="palette" label="Command palette (⌘K) · overlay" width={1440} height={900}>
                <CommandPalette />
              </window.DCArtboard>
              <window.DCArtboard id="shortcuts" label="Keyboard shortcuts (?) · overlay" width={1440} height={900}>
                <Shortcuts />
              </window.DCArtboard>
              <window.DCArtboard id="resume" label="Resume · agent-session drawer (docked from hub)" width={1440} height={900}>
                <Resume />
              </window.DCArtboard>

              {/* Inspectors */}
              <window.DCArtboard id="detail" label="Session detail · diff inspector" width={1440} height={900}>
                <SessionDetail />
              </window.DCArtboard>

              {/* States — how the hub shell behaves across conditions */}
              <window.DCArtboard id="hs-empty" label="State · empty workspace, ready for first agent" width={1440} height={900}>
                <HubStateEmpty />
              </window.DCArtboard>
              <window.DCArtboard id="hs-empty-group" label="State · empty group inside a busy workspace" width={1440} height={900}>
                <HubStateEmptyGroup />
              </window.DCArtboard>
              <window.DCArtboard id="hs-spawning" label="State · spawning agent, model + repo + container selector" width={1440} height={900}>
                <HubStateSpawning />
              </window.DCArtboard>
              <window.DCArtboard id="hs-files-open" label="State · Files toggle on, docked left panel" width={1440} height={900}>
                <HubStateFilesOpen />
              </window.DCArtboard>
              <window.DCArtboard id="hs-shell-open" label="State · Shell toggle on, docked bottom panel" width={1440} height={900}>
                <HubStateShellOpen />
              </window.DCArtboard>
              <window.DCArtboard id="hs-diff-open" label="State · Diff toggle on, docked right panel" width={1440} height={900}>
                <HubStateDiffOpen />
              </window.DCArtboard>
              <window.DCArtboard id="hs-awaiting" label="State · 3 agents blocked on approval" width={1440} height={900}>
                <HubStateAwaiting />
              </window.DCArtboard>
              <window.DCArtboard id="hs-saturated" label="State · saturated, 6 panes splitting H + V" width={1440} height={900}>
                <HubStateSaturated />
              </window.DCArtboard>
              <window.DCArtboard id="hs-focus" label="State · focus mode, one pane maximized" width={1440} height={900}>
                <HubStateFocus />
              </window.DCArtboard>
              <window.DCArtboard id="hs-overflow" label="State · tab overflow, 9 workspaces + group menu" width={1440} height={900}>
                <HubStateTabOverflow />
              </window.DCArtboard>
              <window.DCArtboard id="hs-drag" label="State · pane drag, drop zones + split quadrants" width={1440} height={900}>
                <HubStateDragging />
              </window.DCArtboard>
              <window.DCArtboard id="hs-groupfull" label="State · group full, prompt to split into new group" width={1440} height={900}>
                <HubStateGroupFull />
              </window.DCArtboard>
              <window.DCArtboard id="hs-disconnected" label="State · workspace offline, container reconnect chrome" width={1440} height={900}>
                <HubStateDisconnected />
              </window.DCArtboard>
              <window.DCArtboard id="hs-noworkspace" label="State · no active workspace, recovery prompt" width={1440} height={900}>
                <HubStateNoWorkspace />
              </window.DCArtboard>
              <window.DCArtboard id="hs-heavyload" label="State · heavy load, indexing + CI + builds" width={1440} height={900}>
                <HubStateHeavyLoad />
              </window.DCArtboard>
            </window.DCSection>

            <window.DCSection id="ops" title="Ops" subtitle="System-wide views — health, runtime, configuration">
              <window.DCArtboard id="dashboard" label="Agent dashboard" width={1440} height={900}>
                <Dashboard />
              </window.DCArtboard>
              <window.DCArtboard id="usage" label="Usage · subscriptions, quotas, forecasts" width={1440} height={900}>
                <Usage />
              </window.DCArtboard>
              <window.DCArtboard id="workspaces-runtime" label="Workspaces · runtime detail (containers, mounts, env)" width={1440} height={900}>
                <ContainerInspector />
              </window.DCArtboard>
              <window.DCArtboard id="settings" label="Settings · agents & API keys" width={1440} height={900}>
                <Settings />
              </window.DCArtboard>
              <window.DCArtboard id="agent-settings" label="Agent settings · custom providers" width={1440} height={900}>
                <AgentSettings />
              </window.DCArtboard>
              <window.DCArtboard id="integrations" label="Integrations · GitHub + trackers" width={1440} height={900}>
                <Integrations />
              </window.DCArtboard>
              <window.DCArtboard id="platform" label="Platform · desktop vs web feature matrix" width={1440} height={900}>
                <Platform />
              </window.DCArtboard>
            </window.DCSection>

            <window.DCSection id="onboard" title="Onboarding & Notifications" subtitle="First-run + ambient status + system states">
              <window.DCArtboard id="empty" label="Empty state · welcome" width={1440} height={900}>
                <EmptyState />
              </window.DCArtboard>
              <window.DCArtboard id="states" label="States · loading, errors, empty" width={1440} height={900}>
                <States />
              </window.DCArtboard>
              <window.DCArtboard id="about" label="About · version & updates" width={1440} height={900}>
                <About />
              </window.DCArtboard>
              <window.DCArtboard id="live" label="Live activities + cross-OS notifications" width={1440} height={900}>
                <LiveActivities />
              </window.DCArtboard>
              <window.DCArtboard id="companion" label="Companion · floating overlay avatars" width={1440} height={900}>
                <Companion />
              </window.DCArtboard>
            </window.DCSection>
          </window.DesignCanvas>

          <TweaksPanel>
            <TweakSection label="Typography" />
            <TweakSelect label="Mono"
              value={t.mono}
              options={Object.keys(MONO_STACKS)}
              onChange={(v) => setTweak('mono', v)} />
            <TweakSelect label="Sans"
              value={t.sans}
              options={Object.keys(SANS_STACKS)}
              onChange={(v) => setTweak('sans', v)} />

            <TweakSection label="Theme" />
            <TweakRadio label="Mode"
              value={t.theme}
              options={['dark', 'gray', 'light']}
              onChange={(v) => setTweak('theme', v)} />
            <TweakRadio label="Live accent"
              value={t.liveAccent}
              options={['green', 'amber', 'cyan', 'violet']}
              onChange={(v) => setTweak('liveAccent', v)} />

            <TweakSection label="Density" />
            <TweakRadio label="Spacing"
              value={t.density}
              options={['comfortable', 'compact']}
              onChange={(v) => setTweak('density', v)} />
            <TweakSlider label="Type scale"
              value={t.fontScale} min={12} max={20} step={1}
              unit="px"
              onChange={(v) => setTweak('fontScale', v)} />

            <TweakSection label="Layout" />
            <TweakRadio label="Sidebar"
              value={t.sidebar}
              options={['expanded', 'collapsed']}
              onChange={(v) => setTweak('sidebar', v)} />
            <TweakRadio label="Activity rail"
              value={t.activityRail}
              options={['visible', 'hidden']}
              onChange={(v) => setTweak('activityRail', v)} />

            <TweakSection label="Container model" />
            <TweakRadio label="Default scope"
              value={t.containerModel}
              options={['per-repo', 'per-agent', 'shared']}
              onChange={(v) => setTweak('containerModel', v)} />
            <div style={{
              padding: '8px 10px', fontSize: 11, lineHeight: 1.45,
              color: 'var(--fg-2)', background: 'var(--bg-3)', borderRadius: 6, margin: '4px 0 2px',
            }}>
              {t.containerModel === 'per-repo' && '1 container per repo+branch. Agents on the same repo share fs (recommended).'}
              {t.containerModel === 'per-agent' && '1 container per agent. Strongest isolation, ~2.4s spawn, no cross-agent visibility.'}
              {t.containerModel === 'shared' && '1 container, many agents (current Aviary behaviour). Cheapest, agents can collide.'}
            </div>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
